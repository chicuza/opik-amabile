client_max_body_size 2G;
client_header_buffer_size 16k;
large_client_header_buffers 4 64k;

server {
    listen ${NGINX_PORT} default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- AmabileAI brand overlay -----------------------------------------
    # Serve brand assets (logo, css, cleanup script, favicon variants).
    # JS/CSS get no-cache so iterations during rebrand are immediately picked up.
    # PNG/ICO assets get a short cache.
    location /amabile/brand.css {
        alias /usr/share/nginx/html/amabile/brand.css;
        access_log off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
    location /amabile/brand-cleanup.js {
        alias /usr/share/nginx/html/amabile/brand-cleanup.js;
        access_log off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
    location /amabile/ {
        alias /usr/share/nginx/html/amabile/;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Override upstream favicon with the AmabileAI one.
    location = /favicon.ico {
        alias /usr/share/nginx/html/amabile/favicon.ico;
        access_log off;
        expires 1h;
    }

    location /health {
        add_header Content-Type text/plain;
        access_log off;
        otel_trace off;
        return 200 "healthy\n";
    }

    location @api {
        rewrite /api/(.*) /$1  break;
        # Use environment variable for backend URL (set by Railway)
        proxy_pass ${OPIK_BACKEND_BASE_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        try_files /dev/null @api;
    }

    location @guardrails {
        rewrite /guardrails/(.*) /$1  break;
        # Use environment variable for guardrails URL (set by Railway)
        proxy_pass ${OPIK_GUARDRAILS_BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /guardrails/ {
        try_files /dev/null @guardrails;
    }

    location / {
        # Rewrite the static HTML shell to brand it AmabileAI:
        # - replace <title>, swap favicon link, inject brand css + cleanup js.
        # gzip disabled only for HTML so sub_filter sees raw bytes;
        # JS/CSS/image bundles keep compression for performance.
        gzip off;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '<title>Comet Opik</title>' '<title>AmabileAI Observability</title>';
        sub_filter '<title>Opik</title>'        '<title>AmabileAI Observability</title>';
        sub_filter '/favicon.ico'               '/amabile/favicon.ico';
        # Bust browser/CDN cache on each deploy via timestamp query param.
        # Bust browser/CDN cache on each deploy via timestamp query param.
        sub_filter '</head>'                    '<link rel="apple-touch-icon" sizes="180x180" href="/amabile/amabile-icon-192.png"><link rel="icon" type="image/png" sizes="32x32" href="/amabile/amabile-icon-32.png"><link rel="manifest" href="/amabile/manifest.webmanifest"><link rel="stylesheet" href="/amabile/brand.css?v=7"></head>';
        sub_filter '</body>'                    '<script src="/amabile/brand-cleanup.js?v=7" defer></script></body>';

        try_files $uri $uri/ /index.html;
    }

    add_header X-Trace-ID $otel_trace_id;
}
